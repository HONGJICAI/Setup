---
- name: Setup Ubuntu VPS with sing-box Proxy
  hosts: vps
  become: yes
  vars:
    singbox_port: 443
    singbox_dir: /opt/singbox
    server_name: "www.google.com"  # SNI for reality
    dest_server: "www.google.com:443"  # Reality destination
    
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - software-properties-common
          - openssl
          - qrencode
        state: present

    # BBR Setup
    - name: Check if BBR is already enabled
      shell: sysctl net.ipv4.tcp_congestion_control
      register: bbr_status
      changed_when: false

    - name: Enable BBR in sysctl.conf
      lineinfile:
        path: /etc/sysctl.conf
        line: "{{ item }}"
        create: yes
      loop:
        - "net.core.default_qdisc=fq"
        - "net.ipv4.tcp_congestion_control=bbr"
      when: "'bbr' not in bbr_status.stdout"

    - name: Apply sysctl settings
      command: sysctl -p
      when: "'bbr' not in bbr_status.stdout"

    - name: Verify BBR is enabled
      shell: sysctl net.ipv4.tcp_congestion_control
      register: bbr_verify
      changed_when: false

    - name: Display BBR status
      debug:
        msg: "BBR status: {{ bbr_verify.stdout }}"

    # Docker Installation
    - name: Remove old Docker versions
      apt:
        name:
          - docker
          - docker-engine
          - docker.io
          - containerd
          - runc
        state: absent

    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Docker GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /tmp/docker.gpg
        mode: '0644'

    - name: Add Docker GPG key
      shell: |
        gpg --dearmor -o /etc/apt/keyrings/docker.gpg /tmp/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Update apt cache after adding Docker repo
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Start and enable Docker service
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Display Docker version
      command: docker --version
      register: docker_version
      changed_when: false

    - name: Show Docker version
      debug:
        msg: "Docker version: {{ docker_version.stdout }}"

    # Generate UUID and Keys
    - name: Generate UUID for vless
      shell: cat /proc/sys/kernel/random/uuid
      register: vless_uuid
      changed_when: false

    - name: Generate Reality key pair
      shell: docker run --rm ghcr.io/sagernet/sing-box:latest sing-box generate reality-keypair
      register: reality_keys
      changed_when: false

    - name: Extract private key
      set_fact:
        private_key: "{{ reality_keys.stdout | regex_search('PrivateKey: (.+)', '\\1') | first }}"

    - name: Extract public key
      set_fact:
        public_key: "{{ reality_keys.stdout | regex_search('PublicKey: (.+)', '\\1') | first }}"

    - name: Generate short_id
      shell: openssl rand -hex 8
      register: short_id_result
      changed_when: false

    - name: Set short_id
      set_fact:
        short_id: "{{ short_id_result.stdout }}"

    # Create sing-box directory and configuration
    - name: Create sing-box directory
      file:
        path: "{{ singbox_dir }}"
        state: directory
        mode: '0755'

    - name: Create sing-box config from template
      template:
        src: singbox-config.json.j2
        dest: "{{ singbox_dir }}/config.json"
        mode: '0644'

    - name: Create docker-compose file
      template:
        src: docker-compose.yml.j2
        dest: "{{ singbox_dir }}/docker-compose.yml"
        mode: '0644'

    - name: Stop existing sing-box container
      community.docker.docker_compose:
        project_src: "{{ singbox_dir }}"
        state: absent
      ignore_errors: yes

    - name: Start sing-box container
      community.docker.docker_compose:
        project_src: "{{ singbox_dir }}"
        state: present
        pull: yes

    - name: Wait for sing-box to be ready
      wait_for:
        port: "{{ singbox_port }}"
        delay: 2
        timeout: 30

    # Generate and display vless link
    - name: Get server public IP
      shell: curl -s ifconfig.me
      register: server_ip
      changed_when: false

    - name: Build vless link
      set_fact:
        vless_link: "vless://{{ vless_uuid.stdout }}@{{ server_ip.stdout }}:{{ singbox_port }}?encryption=none&flow=xtls-rprx-vision&security=reality&sni={{ server_name }}&fp=chrome&pbk={{ public_key }}&sid={{ short_id }}&type=tcp&headerType=none#sing-box-reality"

    - name: Display connection information
      debug:
        msg:
          - "=========================================="
          - "sing-box Proxy Setup Complete!"
          - "=========================================="
          - "Server IP: {{ server_ip.stdout }}"
          - "Port: {{ singbox_port }}"
          - "Protocol: vless + reality"
          - ""
          - "UUID: {{ vless_uuid.stdout }}"
          - "Public Key: {{ public_key }}"
          - "Short ID: {{ short_id }}"
          - "SNI: {{ server_name }}"
          - ""
          - "VLESS Connection Link:"
          - "{{ vless_link }}"
          - ""
          - "=========================================="
          - "Save this information securely!"
          - "=========================================="

    - name: Save connection info to file
      copy:
        content: |
          sing-box Proxy Connection Information
          ======================================
          
          Server IP: {{ server_ip.stdout }}
          Port: {{ singbox_port }}
          Protocol: vless + reality
          
          UUID: {{ vless_uuid.stdout }}
          Public Key: {{ public_key }}
          Private Key: {{ private_key }}
          Short ID: {{ short_id }}
          SNI: {{ server_name }}
          
          VLESS Connection Link:
          {{ vless_link }}
          
          Generated at: {{ ansible_date_time.iso8601 }}
        dest: "{{ singbox_dir }}/connection_info.txt"
        mode: '0600'

    - name: Display file location
      debug:
        msg: "Connection information saved to {{ singbox_dir }}/connection_info.txt"
