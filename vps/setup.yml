---
- name: Setup Ubuntu VPS with sing-box Proxy
  hosts: vps
  become: yes
  vars:
    singbox_port: 443
    singbox_dir: /opt/singbox
    server_name: "www.google.com"  # SNI for reality
    dest_server: "www.google.com:443"  # Reality destination
    
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - software-properties-common
          - openssl
          - qrencode
        state: present

    - name: Setup BBR TCP Congestion Control
      include_tasks: tasks/bbr.yml

    - name: Install Docker and Docker Compose
      include_tasks: tasks/docker.yml

    - name: Setup sing-box Proxy
      include_tasks: tasks/singbox.yml
