---
# sing-box Proxy Setup with vless + reality
# Check if existing configuration should be preserved
- name: Check if connection info file exists
  stat:
    path: "{{ singbox_dir }}/connection_info.txt"
  register: connection_info_file

- name: Load existing connection parameters
  shell: |
    grep "^UUID:" {{ singbox_dir }}/connection_info.txt | cut -d' ' -f2
  register: existing_uuid
  when: connection_info_file.stat.exists and not force_regenerate | default(false)
  changed_when: false
  failed_when: false

- name: Load existing private key
  shell: |
    grep "^Private Key:" {{ singbox_dir }}/connection_info.txt | cut -d' ' -f3
  register: existing_private_key
  when: connection_info_file.stat.exists and not force_regenerate | default(false)
  changed_when: false
  failed_when: false

- name: Load existing public key
  shell: |
    grep "^Public Key:" {{ singbox_dir }}/connection_info.txt | cut -d' ' -f3
  register: existing_public_key
  when: connection_info_file.stat.exists and not force_regenerate | default(false)
  changed_when: false
  failed_when: false

- name: Load existing short ID
  shell: |
    grep "^Short ID:" {{ singbox_dir }}/connection_info.txt | cut -d' ' -f3
  register: existing_short_id
  when: connection_info_file.stat.exists and not force_regenerate | default(false)
  changed_when: false
  failed_when: false

- name: Generate UUID for vless
  shell: cat /proc/sys/kernel/random/uuid
  register: vless_uuid
  when: not connection_info_file.stat.exists or force_regenerate | default(false) or existing_uuid.stdout == ''
  changed_when: false

- name: Pull sing-box image
  shell: docker pull ghcr.io/sagernet/sing-box:latest
  register: docker_pull_result
  changed_when: "'Downloaded newer image' in docker_pull_result.stdout or 'Pulling from' in docker_pull_result.stdout"

- name: Generate Reality key pair
  shell: docker run --rm ghcr.io/sagernet/sing-box:latest generate reality-keypair
  register: reality_keys
  when: not connection_info_file.stat.exists or force_regenerate | default(false) or existing_private_key.stdout == ''
  changed_when: false

- name: Extract private key from generation
  set_fact:
    private_key: "{{ reality_keys.stdout | regex_search('PrivateKey: (.+)', '\\1') | first }}"
  when: reality_keys is not skipped
  failed_when: private_key is not defined or private_key == ''

- name: Extract public key from generation
  set_fact:
    public_key: "{{ reality_keys.stdout | regex_search('PublicKey: (.+)', '\\1') | first }}"
  when: reality_keys is not skipped
  failed_when: public_key is not defined or public_key == ''

- name: Use existing private key
  set_fact:
    private_key: "{{ existing_private_key.stdout }}"
  when: connection_info_file.stat.exists and not force_regenerate | default(false) and existing_private_key.stdout != ''

- name: Use existing public key
  set_fact:
    public_key: "{{ existing_public_key.stdout }}"
  when: connection_info_file.stat.exists and not force_regenerate | default(false) and existing_public_key.stdout != ''

- name: Use existing UUID
  set_fact:
    vless_uuid: "{{ {'stdout': existing_uuid.stdout} }}"
  when: connection_info_file.stat.exists and not force_regenerate | default(false) and existing_uuid.stdout != ''

- name: Verify keys were extracted or loaded
  debug:
    msg: "Keys ready - Private: {{ private_key[:10] }}..., Public: {{ public_key[:10] }}..."

- name: Generate short_id
  shell: openssl rand -hex 8
  register: short_id_result
  when: not connection_info_file.stat.exists or force_regenerate | default(false) or existing_short_id.stdout == ''
  changed_when: false

- name: Set short_id from generation
  set_fact:
    short_id: "{{ short_id_result.stdout }}"
  when: short_id_result is not skipped

- name: Use existing short_id
  set_fact:
    short_id: "{{ existing_short_id.stdout }}"
  when: connection_info_file.stat.exists and not force_regenerate | default(false) and existing_short_id.stdout != ''

- name: Display parameter status
  debug:
    msg: "{{ 'Using existing connection parameters' if (connection_info_file.stat.exists and not force_regenerate | default(false)) else 'Generated new connection parameters' }}"

- name: Create sing-box directory
  file:
    path: "{{ singbox_dir }}"
    state: directory
    mode: '0755'

- name: Create sing-box config from template
  template:
    src: singbox-config.json.j2
    dest: "{{ singbox_dir }}/config.json"
    mode: '0644'

- name: Create docker-compose file
  template:
    src: docker-compose.yml.j2
    dest: "{{ singbox_dir }}/docker-compose.yml"
    mode: '0644'

- name: Stop existing sing-box container
  shell: cd {{ singbox_dir }} && docker compose down
  ignore_errors: yes

- name: Start sing-box container
  shell: cd {{ singbox_dir }} && docker compose up -d

- name: Wait for sing-box to be ready
  wait_for:
    port: "{{ singbox_port }}"
    delay: 2
    timeout: 60

- name: Get server public IP
  set_fact:
    server_ip: "{{ ansible_default_ipv4.address | default('') }}"

- name: Get server public IP from external service (fallback)
  shell: curl -s --connect-timeout 5 ifconfig.me || echo ""
  register: external_ip
  changed_when: false
  when: server_ip == ''

- name: Set server IP
  set_fact:
    server_ip: "{{ external_ip.stdout if server_ip == '' else server_ip }}"

- name: Verify server IP was obtained
  fail:
    msg: "Failed to determine server IP address"
  when: server_ip == ''

- name: Build vless link
  set_fact:
    vless_link: "vless://{{ vless_uuid.stdout }}@{{ server_ip }}:{{ singbox_port }}?encryption=none&flow=xtls-rprx-vision&security=reality&sni={{ server_name }}&fp=chrome&pbk={{ public_key }}&sid={{ short_id }}&type=tcp&headerType=none#sing-box-reality"

- name: Display connection information
  debug:
    msg:
      - "=========================================="
      - "sing-box Proxy Setup Complete!"
      - "=========================================="
      - "Server IP: {{ server_ip }}"
      - "Port: {{ singbox_port }}"
      - "Protocol: vless + reality"
      - ""
      - "UUID: {{ vless_uuid.stdout }}"
      - "Public Key: {{ public_key }}"
      - "Short ID: {{ short_id }}"
      - "SNI: {{ server_name }}"
      - ""
      - "VLESS Connection Link:"
      - "{{ vless_link }}"
      - ""
      - "=========================================="
      - "Save this information securely!"
      - "=========================================="

- name: Save connection info to file
  copy:
    content: |
      sing-box Proxy Connection Information
      ======================================
      
      Server IP: {{ server_ip }}
      Port: {{ singbox_port }}
      Protocol: vless + reality
      
      UUID: {{ vless_uuid.stdout }}
      Public Key: {{ public_key }}
      Private Key: {{ private_key }}
      Short ID: {{ short_id }}
      SNI: {{ server_name }}
      
      VLESS Connection Link:
      {{ vless_link }}
      
      Generated at: {{ ansible_date_time.iso8601 }}
    dest: "{{ singbox_dir }}/connection_info.txt"
    mode: '0600'

- name: Display file location
  debug:
    msg: "Connection information saved to {{ singbox_dir }}/connection_info.txt"
